# ── Production Docker Compose ──
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:15-alpine
    container_name: profesional-astro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-profesional_astro}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-profesional_astro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Strapi CMS ──
  strapi:
    build:
      context: .
      dockerfile: Dockerfile.strapi
    container_name: profesional-astro-strapi
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-profesional_astro}?schema=public
      DATABASE_CLIENT: pg
      # Disable SSL for internal Docker network
      DATABASE_SSL: "false"
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1337/_health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Astro SSR ──
  astro:
    build:
      context: .
      dockerfile: Dockerfile.astro
    container_name: profesional-astro-astro
    restart: unless-stopped
    env_file: .env
    environment:
      STRAPI_URL: http://strapi:1337
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-profesional_astro}?schema=public
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      strapi:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4321/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: profesional-astro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - astro
      - strapi
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
